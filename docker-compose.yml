version: '2.1'
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: nrces-snowstorm-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - node.name=snowstorm
      - cluster.name=nrces-snowstorm-cluster
      - "ES_JAVA_OPTS=-Xms4g -Xmx4g"
    volumes:
      - nrces_esdata:/usr/share/elasticsearch/data
    networks:
      elastic:
        aliases:
         - es
    healthcheck:
      test: ["CMD", "curl", "-f", "http://es:9200"]
      interval: 1s
      timeout: 1s
      retries: 60
    ports:
      - 127.0.0.1:9200:9200
    mem_reservation: 4g


  snowstorm:
    image: snomedinternational/snowstorm:10.2.1
    container_name: nrces-snowstorm-api
    restart: always
    depends_on:
      elasticsearch:
        condition: service_healthy
    entrypoint: java -Xms2g -Xmx4g --add-opens java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED -cp @/app/jib-classpath-file org.snomed.snowstorm.SnowstormApplication --elasticsearch.urls=http://es:9200
    volumes:
      # Mount host ./imports directory read-only into the container at /import.
      # Place RF2 (SNOMED CT, NRCeS National Extension), LOINC, ICD-10, HL7 FHIR R4
      # and ABDM terminology files here; they can then be loaded via Snowstorm's
      # import APIs by referencing paths under /import.
      - ./imports:/import:ro
    networks:
      elastic:
        aliases:
         - snowstorm
    ports:
      - "127.0.0.1:8080:8080"

  browser:
    image: snomedinternational/snomedct-browser:latest
    container_name: nrces-snowstorm-browser
    depends_on:
      - snowstorm
    links:
      - snowstorm:snowstorm
    networks:
      - elastic
    environment:
      - API_HOST=http://snowstorm:8080/
    ports:
      - "127.0.0.1:8081:80"
    restart: always
    profiles:
      - browser


networks:
  elastic:

volumes:
  nrces_esdata:
